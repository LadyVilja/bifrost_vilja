name: Deploy Docs
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run docs:build

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./docs/.vitepress/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCS_SSH_PRIVATE_KEY }}" > ~/.ssh/bifrost_docs_deploy_key
          chmod 600 ~/.ssh/bifrost_docs_deploy_key
          ssh-keygen -l -f ~/.ssh/bifrost_docs_deploy_key
          ssh-keyscan -H ${{ secrets.DOCS_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -rlptz --delete \
            -e "ssh -i ~/.ssh/bifrost_docs_deploy_key" \
            ./dist/ ${{ secrets.DOCS_SSH_USER }}@${{ secrets.DOCS_SERVER_HOST }}:/var/www/bifrost-docs/
